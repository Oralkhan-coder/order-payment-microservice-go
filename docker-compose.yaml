services:
  order-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: ./payment-service
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRESQL_DB: payment_db
      POSTGRESQL_URI: payment-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GRPC_PAYMENT_SERVICE_PORT: 9091
      PAYMENT_HTTP_PORT: 8081
    ports:
      - "8081:8081"
      - "9091:9091"

  order-service:
    build:
      context: ./order-service
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started
    environment:
      POSTGRESQL_DB: order_db
      POSTGRESQL_URI: order-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 9091
      PORT: 8080
      GRPC_ORDER_SERVICE_PORT: 9090
    ports:
      - "8080:8080"
      - "9090:9090"

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/