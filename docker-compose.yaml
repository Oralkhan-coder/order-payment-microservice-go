services:
  order-db:
    image: postgres:18.1-bookworm
    container_name: order_db
    environment:
      POSTGRES_USER: ${ORDER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORDER_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ORDER_POSTGRES_USER} -d ${ORDER_POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-db:
    image: postgres:18.1-bookworm
    container_name: payment_db
    environment:
      POSTGRES_USER: ${PAYMENT_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYMENT_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PAYMENT_POSTGRES_USER} -d ${PAYMENT_POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: ./payment-service
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRESQL_DB: ${PAYMENT_POSTGRES_DB}
      POSTGRESQL_HOST: payment-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${PAYMENT_POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${PAYMENT_POSTGRES_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
      GRPC_PAYMENT_SERVICE_PORT: 9091
      PAYMENT_HTTP_PORT: 8081
    ports:
      - "8081:8081"
      - "9091:9091"

  order-service:
    build:
      context: ./order-service
    depends_on:
      order-db:
        condition: service_healthy
      payment-service:
        condition: service_started
    environment:
      POSTGRESQL_DB: ${ORDER_POSTGRES_DB}
      POSTGRESQL_HOST: order-db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${ORDER_POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${ORDER_POSTGRES_PASSWORD}
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 9091
      PORT: 8080
      GRPC_ORDER_SERVICE_PORT: 9090
    ports:
      - "8080:8080"
      - "9090:9090"

  notification-service:
    build:
      context: ./notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}

volumes:
  order_db_data:
  payment_db_data: